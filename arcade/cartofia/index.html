# screen pixels (real, hardware)
WIDTH=1024  # 1280
HEIGHT=600  # 720

# reference/idealized screen pixels
REFX = 1980
REFY = 1080

def u(real, ref, v):
    if abs(v)<0.9999999:
        result = int( (float(real)/100.0) * (v*1000))
        if v<0:
            return real-result
        return result
    return int( (real/ref) * v )

def ux(*argv):
    global WIDTH, REFX
    acc = 0
    for v in argv:
        acc += u(WIDTH, REFX, v)
    return acc

def uy(*argv):
    global HEIGHT, REFY
    acc = 0
    for v in argv:
        acc += u(HEIGHT, REFY, v)
    return acc




# do not rename
async def custom_site():

    import sys
    import asyncio
    import platform
    import json
    from pathlib import Path



    import embed


    platform.document.body.style.background = "#7f7f7f"

    import pygame

    def compose():
        pygame.display.update()
        window.chromakey(None, *screen.get_colorkey(), 40)

    pygame.init()
    pygame.font.init()

    screen = pygame.display.set_mode([ux(.100),uy(.100)], pygame.SRCALPHA, 32)
    screen.set_colorkey( (0,0,0,0), pygame.RLEACCEL )
    screen.fill( (0,0,0,0) )

    compose()

    platform.window.transfer.hidden = true
    platform.window.canvas.style.visibility = "visible"



    apk = "cartofia-game.apk"

    bundle = "cartofia-game"

    # the C or js loader could do that but be explicit.
    appdir = Path(f"/data/data/{bundle}") # /data/data/cartofia-game
    appdir.mkdir()


    # mount apk

    cfg = {
        "io": "url",
        "type":"mount",
        "mount" : {
            "point" : appdir.as_posix(),
            "path" : "/",
        },
        "path" : f"/ => {appdir.as_posix()}",
    }


    track = platform.window.MM.prepare(apk, json.dumps(cfg))

    marginx = ux(.020) # 20%
    marginy = uy(.045) # 45%


    def pg_bar(pos):
        nonlocal marginx, marginy
        # resolution of progress bar, recalculate since it may not be know yet.
        total = track.len or 10  # avoid div0
        slot = ux(.060)/ total # 60%

        pygame.draw.rect(screen,(10,10,10),( marginx-ux(10), marginy-uy(10), (total*slot)+ux(20), uy(110) ) )
        pygame.draw.rect(screen,(0,255,0), ( marginx, marginy, track.pos*slot, uy(90)) )

    # wait until zip mount + overlayfs is complete
    while not track.ready:
        pg_bar(track.pos)
        compose()
        await asyncio.sleep(.1)

    # fill it up in case it was cached and instant download
    pg_bar(track.len)
    compose()


    # preloader will change dir and prepend it to sys.path
    platform.run_main(PyConfig, loaderhome= appdir / "assets", loadermain=None)


    # wait preloading complete
    # that includes images and wasm compilation of bundled modules
    while embed.counter()<0:
        await asyncio.sleep(.1)

    main = appdir / "assets" / "main.py"

    # start async top level machinery and add a console.
    await TopLevel_async_handler.start_toplevel(platform.shell, console=window.python.config.debug)

    # now that apk is mounted we have access to font cache
    # but we need to fill __file__ that is not yet set
    __import__(__name__).__file__ = str(main)


    # now make a prompt
    fnt = pygame.sysfont.SysFont("freesans",  uy(80) )

    def ui_callback(pkg, error=None):
        nonlocal fnt
        if error:
            prompt = fnt.render(f"{error}", True, "black")
        else:
            prompt = fnt.render(f"Setting [{pkg}] up", True, "black")
        pg_bar(track.len)
        screen.blit(prompt, ( marginx+ ux(80), marginy - uy(10) ) )
        compose()

    # test/wait if user media interaction required
    if not platform.window.MM.UME:

        # now make a prompt
        fnt = pygame.sysfont.SysFont("freesans",  uy(80) )
        prompt = fnt.render("Ready to start !", True, "blue")
        pg_bar(track.len)
        screen.blit(prompt, ( marginx+ ux(80), marginy - uy(10) ) )
        compose()
        print("""
        * Waiting for media user engagement : please click/touch page *
    """)
        while not platform.window.MM.UME:
            await asyncio.sleep(.1)

    # cleanup
    screen.fill( (0,0,0,0) )
    pygame.display.flip()

    await shell.runpy(main, callback=ui_callback)



import asyncio

    <script type="application/javascript">
    (() => {
        const canvas = document.getElementById("canvas");
        const controls = document.querySelectorAll("[data-control]");
        if (!canvas || !controls.length) {
            return;
        }

        const KEY_BINDINGS = {
            left: [{ key: "ArrowLeft", code: "ArrowLeft" }],
            right: [{ key: "ArrowRight", code: "ArrowRight" }],
            up: [{ key: "ArrowUp", code: "ArrowUp" }],
            down: [{ key: "ArrowDown", code: "ArrowDown" }],
            jump: [{ key: " ", code: "Space" }],
            confirm: [{ key: "Enter", code: "Enter" }]
        };

        const keyCounts = Object.create(null);
        const activePointers = new Map();

        function dispatchKeyboard(type, key, code) {
            const event = new KeyboardEvent(type, {
                key: key,
                code: code,
                bubbles: true,
                cancelable: true
            });
            canvas.dispatchEvent(event);
            document.dispatchEvent(event);
            window.dispatchEvent(event);
        }

        function setLogicalControl(control, isDown) {
            const bindings = KEY_BINDINGS[control];
            if (!bindings) {
                return;
            }
            for (const binding of bindings) {
                const k = binding.code;
                const prev = Number(keyCounts[k] || 0);
                const next = isDown ? (prev + 1) : Math.max(0, prev - 1);
                keyCounts[k] = next;
                if (isDown && prev === 0) {
                    dispatchKeyboard("keydown", binding.key, binding.code);
                } else if (!isDown && prev > 0 && next === 0) {
                    dispatchKeyboard("keyup", binding.key, binding.code);
                }
            }
        }

        function buttonControl(btn) {
            return String(btn && btn.dataset && btn.dataset.control || "");
        }

        function activateButton(btn) {
            const control = buttonControl(btn);
            if (!control) {
                return;
            }
            btn.classList.add("active");
            setLogicalControl(control, true);
        }

        function deactivateButton(btn) {
            const control = buttonControl(btn);
            if (!control) {
                return;
            }
            btn.classList.remove("active");
            setLogicalControl(control, false);
        }

        function focusCanvas() {
            try {
                canvas.focus();
            } catch (_e) {
                // ignore focus errors
            }
        }

        controls.forEach((btn) => {
            btn.addEventListener("pointerdown", (event) => {
                event.preventDefault();
                focusCanvas();
                const id = String(event.pointerId);
                if (!activePointers.has(id)) {
                    activePointers.set(id, btn);
                    activateButton(btn);
                }
                if (btn.setPointerCapture) {
                    try {
                        btn.setPointerCapture(event.pointerId);
                    } catch (_e) {
                        // ignore capture errors
                    }
                }
            }, { passive: false });

            const release = (event) => {
                const id = String(event.pointerId);
                const target = activePointers.get(id);
                if (!target) {
                    return;
                }
                if (btn.releasePointerCapture) {
                    try {
                        btn.releasePointerCapture(event.pointerId);
                    } catch (_e) {
                        // ignore release errors
                    }
                }
                activePointers.delete(id);
                deactivateButton(target);
            };

            btn.addEventListener("pointerup", release);
            btn.addEventListener("pointercancel", release);
            btn.addEventListener("lostpointercapture", release);
            btn.addEventListener("contextmenu", (event) => event.preventDefault());
        });

        window.addEventListener("blur", () => {
            activePointers.forEach((btn) => deactivateButton(btn));
            activePointers.clear();
        });
    })();
    </script>
